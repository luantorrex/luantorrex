name: Update Stack Overflow Impact Badge

on:
  schedule:
    - cron: '17 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stackoverflow-impact:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update Stack Overflow impact badge
        run: node scripts/update-stackoverflow-impact.js

      - name: Commit badge update
        run: |
          if git diff --quiet -- assets/stackoverflow-impact.svg; then
            echo "Stack Overflow impact badge is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/stackoverflow-impact.svg
          git commit -m "Update Stack Overflow impact badge"
          git push

